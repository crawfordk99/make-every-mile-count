<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculate - Make Every Mile Count</title>
    <link rel="stylesheet" th:href="@{/styles/main.css}" />
</head>
<body>
    <nav>
        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/calculate">Calculate</a></li>
            <li><a href="/dashboard">Dashboard</a></li>
            <li><a href="/login">Login</a></li>
        </ul>
    </nav>
    <div class="container">
        <div class="card">
            <h1>Calculate Fuel Cost Per Mile</h1>
            <form id="calculateForm">
                <div class="form-row">
                    <div>
                        <label for="make">Make</label>
                        <input type="text" id="make" name="make" placeholder="e.g., Toyota" required>
                    </div>
                    <div>
                        <label for="model">Model</label>
                        <input type="text" id="model" name="model" placeholder="e.g., Camry" required>
                    </div>
                </div>
                <div class="form-row">
                    <div>
                        <label for="year">Year</label>
                        <input type="number" id="year" name="year" min="2015" max="2024" placeholder="e.g., 2020" required>
                    </div>
                    <div>
                        <label for="subModel">Sub Model (Optional)</label>
                        <input type="text" id="subModel" name="subModel" placeholder="e.g., SE">
                    </div>
                </div>
                <div class="form-row">
                    <div>
                        <label for="region">Region</label>
                        <select id="region" name="region" required>
                            <option value="">Select a Region</option>
                            <optgroup label="National">
                                <option value="NUS">U.S.</option>
                            </optgroup>
                            <optgroup label="States">
                                <option value="SCA">California</option>
                                <option value="SCO">Colorado</option>
                                <option value="SFL">Florida</option>
                                <option value="SMN">Minnesota</option>
                                <option value="SNY">New York</option>
                                <option value="SOH">Ohio</option>
                                <option value="STX">Texas</option>
                                <option value="SWA">Washington</option>
                            </optgroup>
                            <optgroup label="Metro Areas">
                                <option value="YBOS">Boston, MA</option>
                                <option value="YORD">Chicago, IL</option>
                                <option value="YCLE">Cleveland, OH</option>
                                <option value="YDEN">Denver, CO</option>
                                <option value="Y44HO">Houston, TX</option>
                                <option value="Y05LA">Los Angeles, CA</option>
                                <option value="Y35NY">New York Metro</option>
                            </optgroup>
                        </select>
                    </div>
                    <div>
                        <label for="fuelType">Fuel Type</label>
                        <select id="fuelType" name="fuelType" required>
                            <option value="">Select Fuel Type</option>
                            <option value="EPMP">Premium Unleaded</option>
                            <option value="EPMM">Midgrade Unleaded</option>
                            <option value="EPMR">Regular</option>
                        </select>
                    </div>
                </div>
                <div class = "button-group">
                    <button type="button" onclick="handleAction('calculate')">Calculate Only</button>

                    <div sec:authorize="isAuthenticated()" style="display:inline;">
                        <button type="button" onclick="handleAction('save')">Save & Calculate</button>
                    </div>

                    <div sec:authorize="isAnonymous()" style="display:inline;">
                        <a href="/login" class="btn-link">Login to save this vehicle</a>
                </div>
                
            </form>
            <div id="result" class="result">
                <h2>Results</h2>
                <div class="result-item"><strong>City MPG:</strong> <span id="resultMpg">-</span></div>
                <div class="result-item"><strong>Gas Price:</strong> <span id="resultPrice">-</span></div>
                <div class="result-item"><strong>Cost Per Mile:</strong> <span id="resultCost">-</span></div>
            </div>
        </div>
    </div>

    <script>
        function handleAction(actionType) {
            event.preventDefault();
            
            const make = document.getElementById('make').value;
            const model = document.getElementById('model').value;
            const year = document.getElementById('year').value;
            const subModel = document.getElementById('subModel').value;
            const region = document.getElementById('region').value;
            const fuelType = document.getElementById('fuelType').value;

            const url = actionType === 'save' ? '/api/vehicle/save-calculate' : '/api/calculate';

            try {
                // For now, just show placeholder results
                // Later integrate with actual /api/calculate endpoint
                document.getElementById('resultMpg').textContent = 'Fetching...';
                document.getElementById('resultPrice').textContent = 'Fetching...';
                document.getElementById('resultCost').textContent = 'Fetching...';
                document.getElementById('result').classList.add('show');

                fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ make, model, year, subModel, region, fuelType })
                })
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                    }
                    return response.json();
                })
                .then(data => {
                    document.getElementById('resultMpg').textContent = data.cityMpg + ' MPG';
                    document.getElementById('resultPrice').textContent = '$' + data.gasPrice.toFixed(2) + ' per gallon';
                    document.getElementById('resultCost').textContent = '$' + data.costPerMile.toFixed(3) + ' per mile';
                })
                .catch(error => {                    alert('Error fetching calculation results: ' + error.message);
                    document.getElementById('resultMpg').textContent = '-';
                    document.getElementById('resultPrice').textContent = '-';
                    document.getElementById('resultCost').textContent = '-';
                });

            } catch (error) {
                alert('Error: ' + error.message);
            }
        };
    </script>
</body>
</html>
