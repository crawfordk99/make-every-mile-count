<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en"
xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculate - Make Every Mile Count</title>
    <link rel="stylesheet" th:href="@{/styles/main.css}" />
</head>
<body>
    <nav>
        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/calculate">Calculate</a></li>
            <li><a href="/dashboard">Dashboard</a></li>
            <li><a href="/login">Login</a></li>
        </ul>
    </nav>
    <div class="container">
        <div class="card">
            <h1>Calculate Fuel Cost Per Mile</h1>
            <div sec:authorize="isAuthenticated()" class="form-group mb-4">
                <label for="vehicleSelect" class="form-label"><strong>Choose from your Garage:</strong></label>
                <select id="vehicleSelect" class="form-select" onchange="preFillVehicleData()">
                    <option value="">-- Add a New Vehicle --</option>
                    </select>
                <small class="text-muted">Pick a saved vehicle to skip the API lookup.</small>
            </div>

            <hr sec:authorize="isAuthenticated()">
            <form id="calculateForm">
                <div class="form-row">
                    <input type="hidden" id="vehicleId" name="vehicleId"> <!-- Hidden field to store vehicle ID for edits -->
                    <div>
                        <label for="make">Make</label>
                        <input type="text" id="make" name="make" placeholder="e.g., Toyota" required>
                    </div>
                    <div>
                        <label for="model">Model</label>
                        <input type="text" id="model" name="model" placeholder="e.g., Camry" required>
                    </div>
                </div>
                <div class="form-row">
                    <div>
                        <label for="year">Year</label>
                        <input type="number" id="year" name="year" min="2015" max="2024" placeholder="e.g., 2020" required>
                    </div>
                    <div>
                        <label for="subModel">Sub Model (Optional)</label>
                        <input type="text" id="subModel" name="subModel" placeholder="e.g., SE">
                    </div>
                    
                </div>
                <div class="form-row">
                    <div>
                        <label for="region">Region</label>
                        <select id="region" name="region" required>
                            <option value="">Select a Region</option>
                            <optgroup label="National">
                                <option value="NUS">U.S.</option>
                            </optgroup>
                            <optgroup label="States">
                                <option value="SCA">California</option>
                                <option value="SCO">Colorado</option>
                                <option value="SFL">Florida</option>
                                <option value="SMN">Minnesota</option>
                                <option value="SNY">New York</option>
                                <option value="SOH">Ohio</option>
                                <option value="STX">Texas</option>
                                <option value="SWA">Washington</option>
                            </optgroup>
                            <optgroup label="Metro Areas">
                                <option value="YBOS">Boston, MA</option>
                                <option value="YORD">Chicago, IL</option>
                                <option value="YCLE">Cleveland, OH</option>
                                <option value="YDEN">Denver, CO</option>
                                <option value="Y44HO">Houston, TX</option>
                                <option value="Y05LA">Los Angeles, CA</option>
                                <option value="Y35NY">New York Metro</option>
                            </optgroup>
                        </select>
                    </div>
                    <div>
                        <label for="fuelType">Fuel Type</label>
                        <select id="fuelType" name="fuelType" required>
                            <option value="">Select Fuel Type</option>
                            <option value="EPMP">Premium Unleaded</option>
                            <option value="EPMM">Midgrade Unleaded</option>
                            <option value="EPMR">Regular</option>
                        </select>
                    </div>
                </div>
                <div class = "button-group">
                    <button type="button" onclick="handleAction('calculate')">Calculate Only</button>

                    <div sec:authorize="isAuthenticated()" style="display:inline;">
                        <button type="button" onclick="handleAction('save')">Save & Calculate</button>
                    </div>

                    <div sec:authorize="isAnonymous()" style="display:inline;">
                        <a href="/login" class="btn-link">Login to save this vehicle</a>
                </div>
                
            </form>
            <div id="result" class="result">
                <h2>Results</h2>

                <div class="result-item" id = "mpg-container">
                    <strong>City MPG:</strong> 
                    <span id="resultMpg">-</span>
                    <input type="number" id="inputMpg" style="display:none;" step="0.1">
                    <button onclick="toggleEdit('mpg'); return false;">✏️</button>
                </div>
                <div class="result-item" id = "price-container">
                    <strong>Gas Price:</strong> 
                    <span id="resultPrice">-</span>
                    <input type="number" id="inputPrice" style="display:none;" step="0.01">
                    <button onclick="toggleEdit('price'); return false;">✏️</button>
                </div>
                <div class="result-item"><strong>Cost Per Mile:</strong> <span id="resultCost">-</span></div>

                <button id = "recalculateButton" style="display:none;" onclick="handleRecalculate(event)">Update Calculation</button>
            </div>
        </div>
    </div>

    <script>
        function handleAction(actionType) {
            event.preventDefault();
            
            const payload = {
                vehicleId: document.getElementById('vehicleId') ? document.getElementById('vehicleId').value : null,
                make: document.getElementById('make').value,
                model: document.getElementById('model').value,
                year: document.getElementById('year').value,
                subModel: document.getElementById('subModel').value,
                region: document.getElementById('region').value,
                fuelType: document.getElementById('fuelType').value
            };

            const url = actionType === 'save' ? '/api/vehicle/save-calculate' : '/api/calculate';

            try {
                // For now, just show placeholder results
                // Later integrate with actual /api/calculate endpoint
                document.getElementById('resultMpg').textContent = 'Fetching...';
                document.getElementById('resultPrice').textContent = 'Fetching...';
                document.getElementById('resultCost').textContent = 'Fetching...';
                document.getElementById('result').classList.add('show');

                fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                })
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                    }
                    return response.json();
                })
                .then(data => {
                    document.getElementById('resultMpg').textContent = data.cityMpg + ' MPG';
                    document.getElementById('resultPrice').textContent = '$' + data.gasPrice.toFixed(2) + ' per gallon';
                    document.getElementById('resultCost').textContent = '$' + data.costPerMile.toFixed(3) + ' per mile';
                })
                .catch(error => {                    alert('Error fetching calculation results: ' + error.message);
                    document.getElementById('resultMpg').textContent = '-';
                    document.getElementById('resultPrice').textContent = '-';
                    document.getElementById('resultCost').textContent = '-';
                });

            } catch (error) {
                alert('Error: ' + error.message);
            }
        };

        // 1. Load the vehicles when the page loads
    document.addEventListener('DOMContentLoaded', () => {
        fetch('/api/vehicles')
            .then(response => response.json())
            .then(vehicles => {
                // Defensive check: ensure 'vehicles' is an array
                if (!Array.isArray(vehicles)) {
                    console.error("Expected an array but got:", vehicles);
                    return;
                }
                handleSelectedVehicle(vehicles);
            });
    });

    function handleSelectedVehicle(vehicleData) {
        const select = document.getElementById('vehicleSelect');
        vehicleData.forEach(v => {
            const opt = document.createElement('option');
            opt.value = v.vehicleId;
            opt.textContent = `${v.year} ${v.make} ${v.model} ${v.subModel ? '(' + v.subModel + ')' : ''}`;
            opt.dataset.make = v.make;
            opt.dataset.model = v.model;
            opt.dataset.year = v.year;
            opt.dataset.subModel = v.subModel || "";
            select.appendChild(opt);
        });
    }

    // 2. Pre-fill the form when an option is selected
    function preFillVehicleData() {
        const select = document.getElementById('vehicleSelect');
        const selectedOption = select.options[select.selectedIndex];



        if (select.value === "") {
            // Clear fields for "Add New"
            document.getElementById('vehicleId').value = "";
            document.getElementById('make').value = "";
            document.getElementById('model').value = "";
            document.getElementById('year').value = "";
            document.getElementById('subModel').value = "";
        } else {
            // Fill fields with saved data
            document.getElementById('vehicleId').value = select.value;
            document.getElementById('make').value = selectedOption.dataset.make;
            document.getElementById('model').value = selectedOption.dataset.model;
            document.getElementById('year').value = selectedOption.dataset.year;
            document.getElementById('subModel').value = selectedOption.dataset.subModel || "";

        }
    }

    function toggleEdit(field) {
        const span = document.getElementById(`result${field.charAt(0).toUpperCase() + field.slice(1)}`);
        const input = document.getElementById(`input${field.charAt(0).toUpperCase() + field.slice(1)}`);
        const recalculateButton = document.getElementById('recalculateButton');

        if (input.style.display === 'none') {
            // Switch to edit mode
            input.value = span.textContent.replace(/[^0-9.]/g, ''); // Remove non-numeric characters
            span.style.display = 'none';
            input.style.display = 'inline';
            recalculateButton.style.display = 'inline';
        } else {
            // Switch back to display mode
            span.textContent = field === 'mpg' ? `${input.value} MPG` : `$${parseFloat(input.value).toFixed(2)} per gallon`;
            input.style.display = 'none';
            span.style.display = 'inline';
        }
    }

    async function handleRecalculate(event) {
        // This function will be called when the user edits MPG or Gas Price and clicks "Update Calculation"
        // It should re-submit the form data along with the updated MPG/Gas Price to get a new cost-per-mile calculation
        // For now, it just shows an alert
        event.preventDefault();
        const mpgValue = document.getElementById('inputMpg').value || document.getElementById('resultMpg').innerText;
        const priceValue = document.getElementById('inputPrice').value || document.getElementById('resultPrice').innerText;

        // 2. Build your VehicleRequest DTO
        const payload = {
            vehicleId: document.getElementById('vehicleId').value, 
            manualMpg: parseFloat(mpgValue),
            manualGasPrice: parseFloat(priceValue)
        };

        // 3. POST to your Spring Boot Controller
        const response = await fetch('/api/calculate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        const newCost = await response.json();
        document.getElementById('resultCost').innerText = `$${newCost.costPerMile.toFixed(3)} per mile`;

        alert('Recalculate with updated MPG and Gas Price (functionality to be implemented)');
    }
    </script>
</body>
</html>
