<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Make Every Mile Count</title>
    <link rel="stylesheet" th:href="@{/styles/main.css}" />
</head>
<body>
    <nav>
        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/calculate">Calculate</a></li>
            <li><a href="/dashboard">Dashboard</a></li>
            <li><a href="/login">Login</a></li>
        </ul>
    </nav>
    <div class="container">
        <div class="card">
            <h1>Vehicle Information</h1>
            <div class="empty-state">
                <p>No saved calculations found. <a href="/calculate">Start calculating</a> to save your first calculation!</p>
            </div>

            <!-- Placeholder table (will be populated once authentication is added) -->
            <table style="display: none;" id="calculationsTable">
                <thead>
                    <tr>
                        <th>Vehicle</th>
                        <th>Region</th>
                        <th>Cost Per Mile</th>
                        <th>Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- Table rows will be inserted here -->
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
