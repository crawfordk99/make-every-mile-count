<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Make Every Mile Count</title>
    <link rel="stylesheet" th:href="@{/styles/main.css}" />
</head>
<body class="login">
    <nav>
        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/calculate">Calculate</a></li>
            <li><a href="/dashboard">Dashboard</a></li>
            <li><a href="/login">Login</a></li>
        </ul>
    </nav>
    <div class="container">
        <div class="card">
            <div class = "login-block">
                <h1>Login</h1>
                <form id="loginForm" autocomplete="off">
                    <div>
                        <label for="email">Email</label>
                        <input type="email" id="loginEmail" name="email" placeholder="Enter your email" required>
                    </div>
                    <div>
                        <label for="password">Password</label>
                        <input type="password" id="loginPassword" name="password" placeholder="Enter your password" required>
                    </div>
                    <button type="submit">Login</button>
                </form>
                <div class="toggle-link">
                    Don't have an account? <a href="javascript:void(0)" onclick="toggleAuth()">Sign up here</a>
                </div>
            </div>
            <div class="signup-block" style="display: none;">
                <h2>New here?</h2>
                <p>Sign up to save your calculations and access them anytime!</p>
                <form id="signupForm" autocomplete = "off">
                    <div>
                        <label for="email">Email</label>
                        <input type="email" id="signupEmail" name="email" placeholder="Enter your email" required>
                    </div>
                    <div>
                        <label for="password">Password</label>
                        <input type="password" id="signupPassword" name="password" placeholder="Enter your password" required>
                    </div>
                    <button type="submit">Sign Up</button>
                </form>
                <div class="toggle-link">
                    Already have an account? <a href="javascript:void(0)" onclick="toggleAuth()">Login here</a>
                </div>
            </div>
            <!-- <input type="hidden" id="csrfToken" th:value="${_csrf.token}" />
            <input type="hidden" id="csrfHeader" th:value="${_csrf.headerName}" /> -->
            <div class ="auth-error" style="color: red; display: none; margin-top: 10px;"> </div>
        </div>
    </div>

    <script>
        async function handleLogin(event) {
            event.preventDefault(); // Prevent the default form submission
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            // Security tokens
            // const token = document.getElementById('csrfToken').value;
            // const header = document.getElementById('csrfHeader').value;

            // Construct the body in the format Spring Security expects
            const formData = new URLSearchParams();
            formData.append('email', email); // Matches .usernameParameter("email") in Config
            formData.append('password', password);

            console.log(formData.toString());

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                        // Spring Security requires a CSRF token for POST requests
                        // [header]: token
                    },
                    body: formData,
                    redirect: 'follow' 
                });

                // console.log(response.status + " " + response.statusText);
                if (response.ok) {
                    // Login successful, redirect to the saved calculations page
                    window.location.href = '/dashboard';
        
                } else if (response.status === 401) {
                    alert("Invalid email or password.");
                }

            } catch (error) {
                console.error("Login failed", error);
            }
        }

        

        function toggleAuth() {
            const loginBlock = document.querySelector('.login-block');
            const signupBlock = document.querySelector('.signup-block');
            const authError = document.querySelector('.auth-error');

            authError.style.display= 'none';

            loginBlock.style.display = loginBlock.style.display === 'none' ? 'block' : 'none';
            signupBlock.style.display = signupBlock.style.display === 'none' ? 'block' : 'none';
            

        }

        async function handleSignup(event) {
            event.preventDefault();
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;

            const formData = {
                email: email,
                password: password
            };

            const response = await fetch('/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(formData)
            });

            if (response.ok) {
                alert("Account created! You can now log in.");
                toggleAuth(); // Switch back to the login view
            } else {
                const errorText = await response.text();
                document.getElementById('authError').innerText = errorText;
                document.getElementById('authError').style.display = 'block';
            }
        }
        document.getElementById('loginForm').addEventListener('submit', handleLogin);
        document.getElementById('signupForm').addEventListener('submit', handleSignup);
    </script>
</body>
</html>
