<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Make Every Mile Count</title>
    <link rel="stylesheet" th:href="@{/styles/main.css}" />
</head>
<body class="login">
    <nav>
        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/calculate">Calculate</a></li>
            <li><a href="/saved">Saved Calculations</a></li>
            <li><a href="/login">Login</a></li>
        </ul>
    </nav>
    <div class="container">
        <div class="card">
            <h1>Login</h1>
            <form id="loginForm">
                <div>
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>
                <div>
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>
                <button type="submit">Login</button>
            </form>
            <input type="hidden" id="csrfToken" th:value="${_csrf.token}" />
            <input type="hidden" id="csrfHeader" th:value="${_csrf.headerName}" />
            <div th:if="${param.error}">
                <p style="color: red;">Invalid email or password. Please try again.</p>
            </div>
            <div class="signup-link">
                Don't have an account? <a href="/signup">Sign up here</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Security tokens
            const token = document.getElementById('csrfToken').value;
            const header = document.getElementById('csrfHeader').value;

            // Construct the body in the format Spring Security expects
            const formData = new URLSearchParams();
            formData.append('email', email); // Matches .usernameParameter("email") in Config
            formData.append('password', password);

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                        // Spring Security requires a CSRF token for POST requests
                        [header]: token 
                    },
                    body: formData
                });

                if (response.redirected) {
                    // Success! Spring redirected us to /saved
                    window.location.href = "/saved";
                } else if (response.status === 401) {
                    alert("Invalid email or password.");
                }
            } catch (error) {
                console.error("Login failed", error);
            }
        });
    </script>
</body>
</html>
